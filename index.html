  <main id="app" class="app">
    <!-- Contenu statique pour l'indexation Google : visible sans JavaScript.

    <noscript>
      <section>
        <h1>Taxiloc — annonces entre chauffeurs de taxi artisans</h1>
        <p>Taxiloc est une plateforme d'<strong>annonces réservée aux chauffeurs de taxi artisans</strong>
           (licence ADS), en Île-de-France et en province. On y publie et on y trouve :</p>
        <ul>
          <li><strong>Location de licence taxi (ADS)</strong> et <strong>location-gérance</strong></li>
          <li><strong>Location véhicule + licence</strong></li>
          <li><strong>Remplacement / doublage</strong> de chauffeur</li>
          <li><strong>Vente et achat de licence ADS</strong></li>
          <li><strong>Matériel et accessoires taxi</strong> : lumineux, taximètre, terminal CB (TPE),
              imprimante, plaque / totem, compteur horokilométrique</li>
        </ul>
        <p>Zones couvertes : Paris (75), Hauts-de-Seine (92), Seine-Saint-Denis (93),
           Val-de-Marne (94), Yvelines (78), Val-d'Oise (95), Seine-et-Marne (77) et province.</p>
        <p>Activez JavaScript pour consulter et publier les annonces.</p>
      </section>
    </noscript>
