      <stop offset="0" stop-color="#16365C"/>
      <stop offset="1" stop-color="#3E92D1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="600" height="380" rx="28" fill="#FBF8F1"/>

  <!-- Emblème : épingle + taxi -->
  <g transform="translate(229.6,26) scale(2.2)">
    <path d="M32 2C17 2 5 14 5 29c0 19 27 49 27 49s27-30 27-49C59 14 47 2 32 2Z" fill="url(#tlPin)"/>
    <circle cx="32" cy="28" r="19.5" fill="#fff"/>
